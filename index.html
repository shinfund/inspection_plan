<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>점검계획서 자동 생성기</title>
    <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px}
        .container{background:#fff;border-radius:10px;box-shadow:0 20px 60px rgba(0,0,0,.3);max-width:640px;width:100%;padding:35px 40px}
        h1{color:#333;margin-bottom:24px;text-align:center;font-size:25px}
        .tabs{display:flex;gap:0;margin-bottom:24px;border-bottom:2px solid #e0e0e0}
        .tab{flex:1;padding:12px 8px;text-align:center;cursor:pointer;font-size:13px;font-weight:600;color:#888;border-bottom:3px solid transparent;transition:all .25s}
        .tab:hover{color:#555}.tab.active{color:#667eea;border-bottom-color:#667eea}
        .tab-panel{display:none}.tab-panel.active{display:block}
        .form-group{margin-bottom:18px}
        label{display:block;margin-bottom:6px;color:#555;font-weight:600;font-size:13px}
        select{width:100%;padding:11px;border:2px solid #e0e0e0;border-radius:6px;font-size:14px;color:#333;background:#fff;cursor:pointer}
        select:focus{outline:none;border-color:#667eea}
        .template-area{background:#f9f9f9;border:2px dashed #ccc;border-radius:8px;padding:18px;text-align:center;cursor:pointer;transition:all .3s}
        .template-area:hover{border-color:#667eea;background:#f0f0ff}
        .template-area.dragover{border-color:#667eea;background:#e8eaff;border-width:3px}
        .template-area.loaded{border-color:#4caf50;border-style:solid;background:#e8f5e9}
        .template-area input[type=file]{display:none}
        .template-area .icon{font-size:32px;margin-bottom:6px}
        .template-area .text{font-size:12px;color:#666}
        .template-area .filename{font-weight:600;color:#2e7d32;font-size:13px}
        .holidays-preview{background:#f5f5f5;border:1px solid #ddd;border-radius:6px;padding:12px;margin-bottom:18px;font-size:12px;max-height:130px;overflow-y:auto}
        .holidays-preview h3{margin-bottom:8px;color:#667eea;font-size:13px}
        .holiday-item{display:flex;justify-content:space-between;padding:3px 0;color:#666}
        .holiday-item strong{color:#d32f2f}
        button.gen-btn{width:100%;padding:13px;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border:none;border-radius:6px;font-size:15px;font-weight:600;cursor:pointer;transition:transform .2s,box-shadow .2s;margin-bottom:8px}
        button.gen-btn:hover{transform:translateY(-2px);box-shadow:0 10px 25px rgba(102,126,234,.4)}
        button.gen-btn:active{transform:translateY(0)}
        button.gen-btn:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none}
        .status{text-align:center;padding:10px;border-radius:6px;font-size:12px;margin-top:8px;display:none}
        .status.show{display:block}
        .status.success{background:#e8f5e9;color:#2e7d32;border:1px solid #4caf50}
        .status.error{background:#ffebee;color:#c62828;border:1px solid #f44336}
        .status.loading{background:#e3f2fd;color:#1565c0;border:1px solid #2196f3}
        .info-text{font-size:11px;color:#999;text-align:center;margin-top:14px;line-height:1.6}
        .badge{display:inline-block;font-size:10px;padding:2px 7px;border-radius:10px;margin-left:6px;vertical-align:middle}
        .badge.rec{background:#e8f5e9;color:#2e7d32}.badge.alt{background:#fff3e0;color:#e65100}
        .month-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;margin-top:6px}
        .month-grid label{display:flex;align-items:center;justify-content:center;padding:8px 4px;border:2px solid #e0e0e0;border-radius:6px;cursor:pointer;font-size:13px;font-weight:500;color:#555;transition:all .2s;user-select:none}
        .month-grid label:hover{border-color:#667eea;background:#f0f0ff}
        .month-grid label.checked{border-color:#667eea;background:#e8eaff;color:#667eea;font-weight:700}
        .month-grid input[type=checkbox]{display:none}
        .month-actions{display:flex;gap:8px;margin-top:6px;justify-content:flex-end}
        .month-actions button{background:none;border:1px solid #ccc;border-radius:4px;padding:3px 10px;font-size:11px;color:#666;cursor:pointer;transition:all .2s}
        .month-actions button:hover{border-color:#667eea;color:#667eea}
        .progress-bar{width:100%;height:4px;background:#e0e0e0;border-radius:2px;margin-top:8px;overflow:hidden;display:none}
        .progress-bar.show{display:block}
        .progress-bar .fill{height:100%;background:linear-gradient(90deg,#667eea,#764ba2);border-radius:2px;transition:width .3s}
    </style>
</head>
<body>
<div class="container">
    <h1>점검계획서 자동 생성기</h1>
    <div class="tabs">
        <div class="tab active" onclick="switchTab('builtin')">내장 템플릿 방식 <span class="badge rec">권장</span></div>
        <div class="tab" onclick="switchTab('template')">외부 템플릿 파일 방식 <span class="badge alt">직접선택</span></div>
    </div>
    <div class="form-group">
        <label>연도 선택</label>
        <select id="yearSelect"></select>
    </div>
    <div class="form-group">
        <label>월 선택 <span style="font-weight:400;color:#999;font-size:11px">(복수 선택 가능)</span></label>
        <div class="month-grid" id="monthGrid"></div>
        <div class="month-actions">
            <button onclick="selectMonths('quarter')">분기 선택</button>
            <button onclick="selectMonths('all')">전체 선택</button>
            <button onclick="selectMonths('clear')">초기화</button>
        </div>
    </div>
    <div class="holidays-preview"><h3>선택 월 공휴일</h3><div id="holidaysList"></div></div>

    <div class="tab-panel active" id="panel-builtin">
        <button class="gen-btn" onclick="generateFromBuiltin()">엑셀 생성 (내장 템플릿)</button>
        <p style="font-size:11px;color:#999;text-align:center;margin-top:6px">템플릿이 HTML에 내장되어 있어 외부 파일 없이 바로 생성합니다.<br>서식 100% 보존됩니다.</p>
    </div>

    <div class="tab-panel" id="panel-template">
        <div class="form-group">
            <label>엑셀 템플릿 파일</label>
            <div class="template-area" id="templateArea" onclick="document.getElementById('templateFile').click()">
                <input type="file" id="templateFile" accept=".xlsx" onchange="onTemplateSelected(event)">
                <div class="icon" id="templateIcon">📁</div>
                <div class="text" id="templateText">클릭 또는 파일을 여기에 드래그하세요<br><small>(점검계획서_템플릿.xlsx)</small></div>
            </div>
        </div>
        <button class="gen-btn" id="btnTemplate" onclick="generateFromTemplate()" disabled>엑셀 생성 (외부 템플릿 기반)</button>
    </div>

    <div id="status" class="status"></div>
    <div class="progress-bar" id="progressBar"><div class="fill" id="progressFill" style="width:0%"></div></div>
    <p class="info-text">청송지사 흥해터널 등 4개소 전기안전관리용역 (2차)<br>
    ※ 웹서버에 같은 폴더에 템플릿을 두면 자동 로드됩니다.</p>
</div>

<script>
// ============================================================
//  Holidays & Helpers
// ============================================================
const HOLIDAYS={2025:{"2025-01-01":"신정","2025-01-28":"설날 연휴","2025-01-29":"설날","2025-01-30":"설날 연휴","2025-03-01":"삼일절","2025-05-01":"노동절","2025-05-05":"어린이날/부처님오신날","2025-05-06":"대체공휴일(어린이날)","2025-06-06":"현충일","2025-08-15":"광복절","2025-10-03":"개천절","2025-10-05":"추석 연휴","2025-10-06":"추석","2025-10-07":"추석 연휴","2025-10-08":"대체공휴일(추석)","2025-10-09":"한글날","2025-12-25":"크리스마스"},2026:{"2026-01-01":"신정","2026-02-16":"설날 연휴","2026-02-17":"설날","2026-02-18":"설날 연휴","2026-03-01":"삼일절","2026-03-02":"대체공휴일(삼일절)","2026-05-01":"노동절","2026-05-05":"어린이날","2026-05-24":"부처님오신날","2026-05-25":"대체공휴일(부처님오신날)","2026-06-03":"지방선거일(임시공휴일)","2026-06-06":"현충일","2026-07-17":"제헌절","2026-08-15":"광복절","2026-08-17":"대체공휴일(광복절)","2026-09-24":"추석 연휴","2026-09-25":"추석","2026-09-26":"추석 연휴","2026-10-03":"개천절","2026-10-05":"대체공휴일(개천절)","2026-10-09":"한글날","2026-12-25":"크리스마스"},2027:{"2027-01-01":"신정","2027-02-06":"설날 연휴","2027-02-07":"설날","2027-02-08":"설날 연휴","2027-03-01":"삼일절","2027-05-01":"노동절","2027-05-05":"어린이날","2027-05-13":"부처님오신날","2027-06-06":"현충일","2027-08-15":"광복절","2027-08-16":"대체공휴일(광복절)","2027-09-14":"추석 연휴","2027-09-15":"추석","2027-09-16":"추석 연휴","2027-10-03":"개천절","2027-10-04":"대체공휴일(개천절)","2027-10-09":"한글날","2027-12-25":"크리스마스"}};
function getDIM(y,m){return new Date(y,m,0).getDate()}
function isHol(y,m,d){const s=`${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;return HOLIDAYS[y]&&HOLIDAYS[y][s]}
function getWD(y,m,d){return new Date(y,m-1,d).getDay()}
function getWDN(w){return['일','월','화','수','목','금','토'][w]}
function isBD(y,m,d){const w=getWD(y,m,d);return w>=1&&w<=5&&!isHol(y,m,d)}
function getBDs(y,m){const r=[];for(let d=1;d<=getDIM(y,m);d++)if(isBD(y,m,d))r.push(d);return r}

// ============================================================
//  Template buffer & file handling
// ============================================================
let templateBuffer=null;
const TEMPLATE_FN='점검계획서_템플릿.xlsx';
function markLoaded(fn){
    document.getElementById('templateIcon').textContent='✅';
    document.getElementById('templateText').innerHTML='<span class="filename">'+fn+'</span>';
    document.getElementById('templateArea').classList.add('loaded');
    document.getElementById('btnTemplate').disabled=false;
}
async function tryAutoLoad(){try{const r=await fetch(TEMPLATE_FN);if(r.ok){templateBuffer=await r.arrayBuffer();markLoaded(TEMPLATE_FN+' (자동)');return true}}catch(e){}return false}
function onTemplateSelected(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{templateBuffer=ev.target.result;markLoaded(f.name)};r.readAsArrayBuffer(f)}

// ============================================================
//  XML helpers for JSZip direct modification
// ============================================================
const SSM='http://schemas.openxmlformats.org/spreadsheetml/2006/main';
function parseXml(s){return new DOMParser().parseFromString(s,'application/xml')}
function serXml(doc){return new XMLSerializer().serializeToString(doc)}
function colLetter(c){let s='';c++;while(c>0){c--;s=String.fromCharCode(65+(c%26))+s;c=Math.floor(c/26)}return s}
function colToNum(col){let n=0;for(let i=0;i<col.length;i++)n=n*26+(col.charCodeAt(i)-64);return n}

// 행(row) 요소를 찾거나 없으면 sheetData에 순서대로 생성
function getOrCreateRow(doc, rowNum){
    const ns=SSM;
    const sdArr=doc.getElementsByTagNameNS(ns,'sheetData');
    if(!sdArr.length)return null;
    const sd=sdArr[0];
    const rows=sd.getElementsByTagNameNS(ns,'row');
    const rowStr=String(rowNum);
    for(let i=0;i<rows.length;i++){if(rows[i].getAttribute('r')===rowStr)return rows[i]}
    // 행이 없으면 생성 (OOXML: 행도 순서대로 있어야 함)
    const newRow=doc.createElementNS(ns,'row');
    newRow.setAttribute('r',rowStr);
    const allRows=Array.from(sd.getElementsByTagNameNS(ns,'row'));
    let inserted=false;
    for(let i=0;i<allRows.length;i++){
        if(parseInt(allRows[i].getAttribute('r')||'0')>rowNum){sd.insertBefore(newRow,allRows[i]);inserted=true;break}
    }
    if(!inserted)sd.appendChild(newRow);
    return newRow;
}

// 셀을 찾거나 없으면 행에 열 순서대로 생성
function getOrCreateCell(doc, rowEl, cellRef){
    const ns=SSM;
    const col=cellRef.replace(/[0-9]/g,'');
    const cells=rowEl.getElementsByTagNameNS(ns,'c');
    for(let i=0;i<cells.length;i++){if(cells[i].getAttribute('r')===cellRef)return cells[i]}
    const cell=doc.createElementNS(ns,'c');
    cell.setAttribute('r',cellRef);
    // OOXML: 셀은 열 순서(A→Z)대로 있어야 함 — append하면 A열이 뒤로 밀려 무시됨
    const newColNum=colToNum(col);
    const existing=Array.from(rowEl.getElementsByTagNameNS(ns,'c'));
    let inserted=false;
    for(let i=0;i<existing.length;i++){
        const eCol=(existing[i].getAttribute('r')||'').replace(/[0-9]/g,'');
        if(colToNum(eCol)>newColNum){rowEl.insertBefore(cell,existing[i]);inserted=true;break}
    }
    if(!inserted)rowEl.appendChild(cell);
    return cell;
}

function setCellXml(doc,cellRef,value,type){
    const ns=SSM;
    const rowNum=parseInt(cellRef.replace(/[^0-9]/g,''));
    const rowEl=getOrCreateRow(doc,rowNum);
    if(!rowEl)return;
    const cell=getOrCreateCell(doc,rowEl,cellRef);
    const sAttr=cell.getAttribute('s');
    while(cell.firstChild)cell.removeChild(cell.firstChild);
    cell.removeAttribute('t');
    if(type==='f'){
        const fEl=doc.createElementNS(ns,'f');fEl.textContent=value;cell.appendChild(fEl);
    } else if(type==='n'){
        const vEl=doc.createElementNS(ns,'v');vEl.textContent=value;cell.appendChild(vEl);
    } else if(type==='s' && value!==''){
        cell.setAttribute('t','inlineStr');
        const isEl=doc.createElementNS(ns,'is');
        const tEl=doc.createElementNS(ns,'t');
        tEl.textContent=value;isEl.appendChild(tEl);cell.appendChild(isEl);
    }
    if(sAttr)cell.setAttribute('s',sAttr);
}

// ── 색상 스타일 맵 (generateFromBuffer에서 styles.xml 조작 후 초기화) ──────────
// {black, blue, red, darkBlue} → styles.xml의 cellXfs 인덱스
// 인라인 리치텍스트 방식 대신 styles.xml에 색상 XF를 직접 추가하는 방식 사용
// → 폰트명·크기·정렬·테두리 등 셀 서식을 템플릿에서 100% 상속, 색상만 변경
// → 숫자셀(일자)은 그대로 'n' 타입 → Excel 오류 삼각형 없음
let _colorStyles=null;

async function buildColorStyles(zip, sheetFile, refCellRef){
    const ns=SSM;
    try{
        // 1. 참조 셀의 스타일 인덱스 읽기 (C6: 직원명 셀 — 데이터 셀 대표 서식)
        const sheetXml=await zip.file('xl/'+sheetFile).async('string');
        const sheetDoc=parseXml(sheetXml);
        const refRow=refCellRef.replace(/[^0-9]/g,'');
        let baseStyleIdx=0;
        const rows=sheetDoc.getElementsByTagNameNS(ns,'row');
        outer: for(let i=0;i<rows.length;i++){
            if(rows[i].getAttribute('r')===refRow){
                const cells=rows[i].getElementsByTagNameNS(ns,'c');
                for(let j=0;j<cells.length;j++){
                    if(cells[j].getAttribute('r')===refCellRef){
                        const s=cells[j].getAttribute('s');
                        if(s)baseStyleIdx=parseInt(s);
                        break outer;
                    }
                }
                break;
            }
        }
        // 2. styles.xml 파싱
        const stylesXml=await zip.file('xl/styles.xml').async('string');
        const stylesDoc=parseXml(stylesXml);
        const fontsEl=stylesDoc.getElementsByTagNameNS(ns,'fonts')[0];
        const cellXfsEl=stylesDoc.getElementsByTagNameNS(ns,'cellXfs')[0];
        const allXfs=cellXfsEl.getElementsByTagNameNS(ns,'xf');
        const baseXf=allXfs[baseStyleIdx]||allXfs[0];
        const baseFontId=parseInt(baseXf.getAttribute('fontId')||'0');
        const allFonts=fontsEl.getElementsByTagNameNS(ns,'font');
        const baseFont=allFonts[baseFontId]||allFonts[0];
        // 3. 색상별 font + XF 생성
        const colorDefs=[
            ['black',   'FF000000'],
            ['blue',    'FF2563EB'],
            ['red',     'FFDC2626'],
            ['darkBlue','FF1D4ED8']
        ];
        const map={};
        for(const [name,hex] of colorDefs){
            // 기본 font 복제 → color 교체
            const newFont=baseFont.cloneNode(true);
            Array.from(newFont.getElementsByTagNameNS(ns,'color'))
                .forEach(el=>el.parentNode.removeChild(el));
            const cEl=stylesDoc.createElementNS(ns,'color');
            cEl.setAttribute('rgb',hex);
            newFont.appendChild(cEl);
            fontsEl.appendChild(newFont);
            const newFontId=fontsEl.getElementsByTagNameNS(ns,'font').length-1;
            fontsEl.setAttribute('count',String(newFontId+1));
            // 기본 XF 복제 → fontId 교체
            const newXf=baseXf.cloneNode(true);
            newXf.setAttribute('fontId',String(newFontId));
            newXf.setAttribute('applyFont','1');
            cellXfsEl.appendChild(newXf);
            const newStyleIdx=cellXfsEl.getElementsByTagNameNS(ns,'xf').length-1;
            cellXfsEl.setAttribute('count',String(newStyleIdx+1));
            map[name]=newStyleIdx;
        }
        // vacationBg: 연두색 배경 + 검정 글자 (2026년 5월 4일 휴가 대체 직원용)
        const fillsEl=stylesDoc.getElementsByTagNameNS(ns,'fills')[0];
        const newFill=stylesDoc.createElementNS(ns,'fill');
        const pfEl=stylesDoc.createElementNS(ns,'patternFill');
        pfEl.setAttribute('patternType','solid');
        const fgEl=stylesDoc.createElementNS(ns,'fgColor');
        fgEl.setAttribute('rgb','FFCCFFCC'); // 연한 연두색
        pfEl.appendChild(fgEl);
        const bgEl2=stylesDoc.createElementNS(ns,'bgColor');
        bgEl2.setAttribute('indexed','64');
        pfEl.appendChild(bgEl2);
        newFill.appendChild(pfEl);
        fillsEl.appendChild(newFill);
        const newFillId=fillsEl.getElementsByTagNameNS(ns,'fill').length-1;
        fillsEl.setAttribute('count',String(newFillId+1));
        // 검정 폰트 생성
        const newFontBlk=baseFont.cloneNode(true);
        Array.from(newFontBlk.getElementsByTagNameNS(ns,'color')).forEach(el=>el.parentNode.removeChild(el));
        const cBlk=stylesDoc.createElementNS(ns,'color');cBlk.setAttribute('rgb','FF000000');
        newFontBlk.appendChild(cBlk);
        fontsEl.appendChild(newFontBlk);
        const newFontIdBlk=fontsEl.getElementsByTagNameNS(ns,'font').length-1;
        fontsEl.setAttribute('count',String(newFontIdBlk+1));
        // XF: 연두색 배경 + 검정 폰트
        const newXfVac=baseXf.cloneNode(true);
        newXfVac.setAttribute('fontId',String(newFontIdBlk));
        newXfVac.setAttribute('applyFont','1');
        newXfVac.setAttribute('fillId',String(newFillId));
        newXfVac.setAttribute('applyFill','1');
        cellXfsEl.appendChild(newXfVac);
        const newStyleIdxVac=cellXfsEl.getElementsByTagNameNS(ns,'xf').length-1;
        cellXfsEl.setAttribute('count',String(newStyleIdxVac+1));
        map['vacationBg']=newStyleIdxVac;
        zip.file('xl/styles.xml',serXml(stylesDoc));
        return map;
    }catch(e){console.error('buildColorStyles:',e);return null;}
}

// 스타일 인덱스를 직접 지정해서 셀 값 설정 (폰트는 XF에서 완전 상속)
function setCellXmlStyled(doc,cellRef,value,type,styleIdx){
    const ns=SSM;
    const rowNum=parseInt(cellRef.replace(/[^0-9]/g,''));
    const rowEl=getOrCreateRow(doc,rowNum);
    if(!rowEl)return;
    const cell=getOrCreateCell(doc,rowEl,cellRef);
    while(cell.firstChild)cell.removeChild(cell.firstChild);
    cell.removeAttribute('t');
    // 스타일 적용 (null이면 기존 s 유지)
    if(styleIdx!=null)cell.setAttribute('s',String(styleIdx));
    if(type==='n'&&value!==''&&value!=null){
        const vEl=doc.createElementNS(ns,'v');vEl.textContent=String(value);cell.appendChild(vEl);
    }else if(type==='s'&&value!==''&&value!=null){
        cell.setAttribute('t','inlineStr');
        const isEl=doc.createElementNS(ns,'is');
        const tEl=doc.createElementNS(ns,'t');
        tEl.setAttribute('xml:space','preserve');tEl.textContent=String(value);
        isEl.appendChild(tEl);cell.appendChild(isEl);
    }
}

// 날짜 유형에 따른 색상 키 반환 (_colorStyles 키)
function getDayColorKey(year,month,d){
    const hol=isHol(year,month,d);
    const wd=getWD(year,month,d);
    if(hol||wd===0)return'red';   // 일요일/공휴일
    if(wd===6)return'blue';        // 토요일
    return'black';                  // 평일
}
// 색상 키 → styles.xml 스타일 인덱스 (없으면 null → 기존 s 유지)
function cs(key){return _colorStyles?_colorStyles[key]:null;}

// Fill 근무표_안전관리자 (sheet3)
function fillDutySheet(doc, year, month, staff){
    const dim=getDIM(year,month);
    for(let d=1;d<=31;d++){
        const r=5+d;
        const aRef='A'+r, bRef='B'+r;
        if(d<=dim){
            const wd=getWD(year,month,d);
            const hol=isHol(year,month,d);
            const bd=isBD(year,month,d);
            const ck=getDayColorKey(year,month,d);
            setCellXmlStyled(doc, aRef, d, 'n', cs(ck));       // 숫자 그대로 → 오류 삼각형 없음
            setCellXmlStyled(doc, bRef, getWDN(wd), 's', cs(ck));
            for(let i=0;i<staff.length;i++){
                const cRef=colLetter(2+i)+r;
                // 2026년 5월 4일: 손대현(i=0)·금동연(i=2) 셀만 연두배경, 나머지는 정상
                if(bd && year===2026 && month===5 && d===4){
                    if(i===0)      setCellXmlStyled(doc,cRef,'손대현','s',cs('vacationBg'));
                    else if(i===2) setCellXmlStyled(doc,cRef,'금동연','s',cs('vacationBg'));
                    else           setCellXml(doc,cRef,staff[i],'s');
                }else{
                    setCellXml(doc,cRef,bd?staff[i]:'',bd?'s':'');
                }
            }
            setCellXmlStyled(doc, 'G'+r, hol||'', hol?'s':'', hol?cs('red'):null);
        } else {
            setCellXml(doc, aRef, '', '');
            setCellXml(doc, bRef, '', '');
            for(let i=0;i<4;i++) setCellXml(doc, colLetter(2+i)+r, '', '');
            setCellXml(doc, 'G'+r, '', '');
        }
    }
    for(let c=2;c<=5;c++){
        const cl=colLetter(c);
        setCellXml(doc, cl+'37', 'COUNTA('+cl+'6:'+cl+(5+dim)+')', 'f');
    }
}

// Fill 근무표_점검팀 (sheet4)
function fillDutyTeamSheet(doc, year, month){
    const dim=getDIM(year,month);
    const tp=['흥해','흥해','청하','청하','청하','청하','남정5','남정5'];

    let b1=null,b2=null;
    for(let d=7;d<=11;d++)if(isBD(year,month,d)){b1=d;break}
    for(let d=20;d<=25;d++)if(isBD(year,month,d)){b2=d;break}

    const tanA={};
    if(b1)tanA[b1]='차단계획 (차단막)';
    if(b2)tanA[b2]='차단계획 (차단막)';
    for(let d=1;d<=dim;d++){
        if(tanA[d]||!isBD(year,month,d))continue;
        const w=getWD(year,month,d);
        if(w===5)tanA[d]='차단계획 (단터널)';
        if(w===1&&!tanA[d])tanA[d]='차단계획 (단터널)';
    }
    const jangA={};let pi=0;
    for(let d=1;d<=dim;d++){
        if(!isBD(year,month,d)||d<3)continue;
        if(getWD(year,month,d)===5)continue;
        const ta=tanA[d];
        if(!ta||ta.includes('단터널')){
            if(pi<tp.length){jangA[d]=tp[pi];pi++}
        }
    }

    for(let d=1;d<=31;d++){
        const r=5+d;
        if(d<=dim){
            const wd=getWD(year,month,d);
            const hol=isHol(year,month,d);
            const bd=isBD(year,month,d);
            const ck=getDayColorKey(year,month,d);
            setCellXmlStyled(doc,'A'+r,d,'n',cs(ck));           // 숫자 → 오류 삼각형 없음
            setCellXmlStyled(doc,'B'+r,getWDN(wd),'s',cs(ck));
            const ta=tanA[d],ja=jangA[d];
            // 2026년 5월 4일: 점검팀 근무표 전체 빈 셀
            const skipTeamDay=(year===2026&&month===5&&d===4);
            setCellXml(doc,'C'+r,(!skipTeamDay&&bd&&(ta||ja))?'손대현':'',(!skipTeamDay&&bd&&(ta||ja))?'s':'');
            setCellXml(doc,'D'+r,(!skipTeamDay&&bd&&(ta||ja))?'금동연':'',(!skipTeamDay&&bd&&(ta||ja))?'s':'');
            setCellXml(doc,'E'+r,(!skipTeamDay&&ja)||'',(!skipTeamDay&&ja)?'s':'');
            // 차단막=진파랑, 단터널=검정 (setCellXmlStyled로 통일 — 폰트 일치)
            if(!skipTeamDay&&ta==='차단계획 (차단막)')setCellXmlStyled(doc,'F'+r,ta,'s',cs('darkBlue'));
            else setCellXml(doc,'F'+r,(!skipTeamDay&&ta)||'',(!skipTeamDay&&ta)?'s':'');
            setCellXmlStyled(doc,'G'+r,hol||'',hol?'s':'',hol?cs('red'):null);
        } else {
            setCellXml(doc,'A'+r,'','');setCellXml(doc,'B'+r,'','');
            for(let c=2;c<=6;c++)setCellXml(doc,colLetter(c)+r,'','');
        }
    }
    return {tanA, jangA};
}

// ── 정기점검_점검팀 시트: 수식 대신 직접 값 입력 ──────────────────────────────
// 정기점검1_점검팀 / 정기점검1_점검팀_분기 → E7=흥해, F7=청하, G7=남정5
function fillTeamInspection1Days(doc, year, month, jangA){
    const dim=getDIM(year,month);
    const hae=[],cha=[],nam=[];
    for(let d=1;d<=dim;d++){
        if(jangA[d]==='흥해') hae.push(d);
        else if(jangA[d]==='청하') cha.push(d);
        else if(jangA[d]==='남정5') nam.push(d);
    }
    const fmt=arr=>arr.length?arr.join(',')+' 일':'-';
    setCellXml(doc,'E7',fmt(hae),'s');
    setCellXml(doc,'F7',fmt(cha),'s');
    setCellXml(doc,'G7',fmt(nam),'s');
}
// 정기점검2_점검팀 / 정기점검2_점검팀_분기 → E7=단터널 일수
function fillTeamInspection2Days(doc, year, month, tanA){
    const dim=getDIM(year,month);
    const tan=[];
    for(let d=1;d<=dim;d++){
        if(tanA[d]) tan.push(d);
    }
    const fmt=arr=>arr.length?arr.join(',')+' 일':'-';
    setCellXml(doc,'E7',fmt(tan),'s');
}

// Fill periodic date row (row 5)
function fillPeriodicDateRow(doc, year, month, maxCol){
    const bdays=getBDs(year,month);
    let bi=0;
    for(let c=3;c<maxCol;c+=2){
        const ref=colLetter(c)+'5';
        if(bi<bdays.length){
            setCellXml(doc, ref, bdays[bi], 'n');
            bi++;
        } else {
            setCellXml(doc, ref, '', '');
        }
    }
}

// Fill AN column (col 40 = AN, 0-based=39)
function fillANColumn(doc, month, maxRow){
    const q=Math.ceil(month/3);
    const ns=SSM;
    const rows=doc.getElementsByTagNameNS(ns,'row');
    for(let i=0;i<rows.length;i++){
        const rnum=parseInt(rows[i].getAttribute('r'));
        if(rnum<6||rnum>maxRow)continue;
        const cells=rows[i].getElementsByTagNameNS(ns,'c');
        let anCell=null;
        for(let j=0;j<cells.length;j++){
            const ref=cells[j].getAttribute('r');
            if(ref&&ref.startsWith('AN'))anCell=cells[j];
        }
        if(!anCell||!anCell.getAttribute('r')||!anCell.getAttribute('r').startsWith('AN'))continue;
        const anV=anCell.getElementsByTagNameNS(ns,'v');
        const anIs=anCell.getElementsByTagNameNS(ns,'is');
        if(anV.length===0&&anIs.length===0)continue;
        const anRef=anCell.getAttribute('r');
        const qs=(q-1)*3+1, qe=q*3;
        const newText=qs+'~'+qe+'월중 점검';
        setCellXml(doc, anRef, newText, 's');
    }
}

// 단일 시트 XML에 zoom 적용 (문자열 조작 — serXml 사용 시 네임스페이스 깨짐 방지)
async function setSheetZoom(zip, jszipPath, zoom){
    try{
        let xml=await zip.file(jszipPath).async('string');
        const z=String(zoom);
        if(/<sheetView\b/.test(xml)){
            // 기존 <sheetView ...> 또는 <sheetView .../> 에 zoom 속성 추가/교체
            xml=xml.replace(/<sheetView\b([^>]*?)(\/?>)/g,(match,attrs,closing)=>{
                if(/\bzoomScale=/.test(attrs)){
                    attrs=attrs.replace(/\bzoomScale="[^"]*"/,`zoomScale="${z}"`);
                } else {
                    attrs=` zoomScale="${z}"`+attrs;
                }
                if(/\bzoomScaleNormal=/.test(attrs)){
                    attrs=attrs.replace(/\bzoomScaleNormal="[^"]*"/,`zoomScaleNormal="${z}"`);
                } else {
                    attrs=` zoomScaleNormal="${z}"`+attrs;
                }
                return `<sheetView${attrs}${closing}`;
            });
        } else {
            // sheetView가 없으면 sheetData 바로 앞에 삽입
            xml=xml.replace(/(<sheetData\b)/,
                `<sheetViews><sheetView workbookViewId="0" zoomScale="${z}" zoomScaleNormal="${z}"/></sheetViews>$1`);
        }
        zip.file(jszipPath, xml);
    }catch(e){console.error('setSheetZoom('+jszipPath+'):',e);}
}

// zip 내 모든 시트(xl/worksheets/sheet*.xml)에 zoom 적용
async function setAllSheetsZoom(zip, zoom){
    const paths=Object.keys(zip.files).filter(k=>/^xl\/worksheets\/sheet\d+\.xml$/.test(k));
    for(const p of paths) await setSheetZoom(zip,p,zoom);
}

// 지정 열(G 등)의 셀에 shrinkToFit(셀에 맞춤) 정렬 속성 적용
// ※ styles.xml은 DOM+serXml, 시트 XML은 문자열 조작으로 처리
async function applyGColumnAlignment(zip, sheetFile, rowStart, rowEnd){
    try{
        // 1. styles.xml 읽기 (DOM)
        const stylesXml=await zip.file('xl/styles.xml').async('string');
        const stylesDoc=parseXml(stylesXml);
        const xfsEl=stylesDoc.getElementsByTagName('cellXfs')[0];
        if(!xfsEl)return;
        const xfEls=Array.from(xfsEl.getElementsByTagName('xf'));

        // 2. 시트 XML 읽기 (문자열)
        let sheetStr=await zip.file('xl/'+sheetFile).async('string');

        // 3. G열 rowStart~rowEnd 범위 셀의 고유 스타일 인덱스 수집
        const styleSet=new Set();
        sheetStr.replace(/<c\b[^>]*>/g,tag=>{
            const rM=tag.match(/\br="G(\d+)"/);
            if(!rM)return tag;
            const row=parseInt(rM[1]);
            if(row<rowStart||row>rowEnd)return tag;
            const sM=tag.match(/\bs="(\d+)"/);
            styleSet.add(sM?sM[1]:'0');
            return tag;
        });
        if(!styleSet.size)return;

        // 4. 각 스타일에 대해 shrinkToFit 적용 XF 클론 생성
        let baseCount=xfEls.length;
        const styleMap={};
        let added=0;
        for(const idxStr of styleSet){
            const idx=parseInt(idxStr);
            const origXf=(idx<xfEls.length?xfEls[idx]:xfEls[0]).cloneNode(true);
            origXf.setAttribute('applyAlignment','1');
            // alignment 요소 찾기 또는 생성
            let aEl=origXf.getElementsByTagNameNS(SSM,'alignment')[0]
                   ||origXf.getElementsByTagName('alignment')[0];
            if(!aEl){
                aEl=stylesDoc.createElementNS(SSM,'alignment');
                origXf.appendChild(aEl);
            }
            aEl.setAttribute('shrinkToFit','1');
            // wrapText가 있으면 제거 (충돌 방지)
            aEl.removeAttribute('wrapText');
            xfsEl.appendChild(origXf);
            styleMap[idxStr]=String(baseCount+added);
            added++;
        }

        // 5. 시트 XML에서 G열 셀의 s 속성 교체 (문자열 조작)
        sheetStr=sheetStr.replace(/<c\b[^>]*>/g,tag=>{
            const rM=tag.match(/\br="G(\d+)"/);
            if(!rM)return tag;
            const row=parseInt(rM[1]);
            if(row<rowStart||row>rowEnd)return tag;
            const sM=tag.match(/\bs="(\d+)"/);
            const oldS=sM?sM[1]:'0';
            const newS=styleMap[oldS];
            if(!newS)return tag;
            return sM
                ?tag.replace(/\bs="[^"]*"/,`s="${newS}"`)
                :tag.replace(/^<c\b/,`<c s="${newS}"`);
        });

        // 6. 저장
        zip.file('xl/'+sheetFile, sheetStr);
        zip.file('xl/styles.xml', serXml(stylesDoc));
    }catch(e){console.error('applyGColumnAlignment:',e);}
}

// workbook.xml의 <sheet> 태그에 state="hidden" 추가 → 시트 숨기기
// ※ 파일 삭제 없이 속성 하나만 추가하므로 XML 구조 변경 없음 → 오류 없음
async function hideSheetsInWorkbook(zip, sheetNamesToHide){
    if(!sheetNamesToHide||sheetNamesToHide.length===0)return;
    try{
        let wbText=await zip.file('xl/workbook.xml').async('string');
        for(const name of sheetNamesToHide){
            // <sheet ... name="시트명" .../> 태그를 찾아 state="hidden" 추가
            // 이미 state= 속성이 있으면 교체, 없으면 /> 바로 앞에 추가
            wbText=wbText.replace(
                new RegExp(`(<sheet\\b[^>]*\\bname="${name}"[^>]*?)(\\/>)`,'g'),
                (match, attrs, closing)=>{
                    if(/\bstate=/.test(attrs)){
                        attrs=attrs.replace(/\bstate="[^"]*"/,'state="hidden"');
                    } else {
                        attrs=attrs+' state="hidden"';
                    }
                    return attrs+closing;
                }
            );
        }
        zip.file('xl/workbook.xml', wbText);
    }catch(e){console.error('hideSheetsInWorkbook:',e);}
}

// ============================================================
async function generateFromBuffer(buf, year, month){
    const zip=await JSZip.loadAsync(buf);

    // 0. calcChain.xml 삭제 (수식→값 교체 시 충돌 방지, Excel이 자동 재생성)
    zip.remove('xl/calcChain.xml');

    // 1. SharedStrings: replace "0월" → "{month}월"
    let ssText=await zip.file('xl/sharedStrings.xml').async('string');
    ssText=ssText.replace(/0월/g, month+'월');
    zip.file('xl/sharedStrings.xml', ssText);

    // 2. Sheet files
    const sheetFiles=['worksheets/sheet1.xml','worksheets/sheet2.xml','worksheets/sheet3.xml',
        'worksheets/sheet4.xml','worksheets/sheet5.xml','worksheets/sheet6.xml',
        'worksheets/sheet7.xml','worksheets/sheet8.xml','worksheets/sheet9.xml',
        'worksheets/sheet10.xml','worksheets/sheet11.xml'];

    // 3. styles.xml에 색상 스타일 XF 생성 (sheetFiles 선언 후 실행 — 순서 중요)
    _colorStyles=await buildColorStyles(zip, sheetFiles[2], 'C6');

    // 3. 표지 (sheet1) - A5: month월 점검계획서
    let s1=parseXml(await zip.file('xl/'+sheetFiles[0]).async('string'));
    setCellXml(s1,'A5',month+'월 점검계획서','s');
    zip.file('xl/'+sheetFiles[0], serXml(s1));

    // 4. 근무표_안전관리자 (sheet3)
    let s3=parseXml(await zip.file('xl/'+sheetFiles[2]).async('string'));
    fillDutySheet(s3, year, month, ['공우식','김동록','신종섭','김태선']);
    zip.file('xl/'+sheetFiles[2], serXml(s3));

    // 5. 근무표_점검팀 (sheet4)
    let s4=parseXml(await zip.file('xl/'+sheetFiles[3]).async('string'));
    const {tanA, jangA}=fillDutyTeamSheet(s4, year, month);
    zip.file('xl/'+sheetFiles[3], serXml(s4));

    // 5a. 정기점검1_점검팀 (sheet8) - 수식→직접 값
    let s8=parseXml(await zip.file('xl/'+sheetFiles[7]).async('string'));
    fillTeamInspection1Days(s8, year, month, jangA);
    zip.file('xl/'+sheetFiles[7], serXml(s8));

    // 5b. 정기점검2_점검팀 (sheet9) - 수식→직접 값
    let s9=parseXml(await zip.file('xl/'+sheetFiles[8]).async('string'));
    fillTeamInspection2Days(s9, year, month, tanA);
    zip.file('xl/'+sheetFiles[8], serXml(s9));

    // 5c. 정기점검1_점검팀_분기 (sheet10) - 수식→직접 값
    let s10=parseXml(await zip.file('xl/'+sheetFiles[9]).async('string'));
    fillTeamInspection1Days(s10, year, month, jangA);
    zip.file('xl/'+sheetFiles[9], serXml(s10));

    // 5d. 정기점검2_점검팀_분기 (sheet11) - 수식→직접 값
    let s11=parseXml(await zip.file('xl/'+sheetFiles[10]).async('string'));
    fillTeamInspection2Days(s11, year, month, tanA);
    zip.file('xl/'+sheetFiles[10], serXml(s11));

    // 6. 정기점검1_안전관리자 (sheet6) - date row
    let s6=parseXml(await zip.file('xl/'+sheetFiles[5]).async('string'));
    fillPeriodicDateRow(s6, year, month, 47);
    fillANColumn(s6, month, 35);
    zip.file('xl/'+sheetFiles[5], serXml(s6));

    // 7. 정기점검2_안전관리자 (sheet7) - date row
    let s7=parseXml(await zip.file('xl/'+sheetFiles[6]).async('string'));
    fillPeriodicDateRow(s7, year, month, 47);
    fillANColumn(s7, month, 46);
    zip.file('xl/'+sheetFiles[6], serXml(s7));

    // 8. 비고(G열) 셀에 맞춤(shrinkToFit) 적용 — 근무표_안전관리자, 근무표_점검팀
    await applyGColumnAlignment(zip, sheetFiles[2], 5, 37); // 근무표_안전관리자
    await applyGColumnAlignment(zip, sheetFiles[3], 5, 37); // 근무표_점검팀

    // 10. 모든 시트 zoom 80% 적용
    await setAllSheetsZoom(zip, 80);

    // 11. 분기 여부에 따라 시트 조건부 숨기기
    // 3·6·9·12월(분기): 분기 시트 표시 → 점검팀 시트 숨김
    // 그 외: 점검팀 시트 표시 → 분기 시트 숨김
    const isQuarterMonth=[3,6,9,12].includes(month);
    const sheetsToHide=isQuarterMonth
        ?['정기점검1_점검팀','정기점검2_점검팀']
        :['정기점검1_점검팀_분기','정기점검2_점검팀_분기'];
    await hideSheetsInWorkbook(zip, sheetsToHide);

    // Generate and download
    const blob=await zip.generateAsync({type:'blob',compression:'DEFLATE'});
    const fn=year+'년 '+month+'월 점검계획서_수자원.xlsx';
    const a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    a.download=fn;
    a.click();
    URL.revokeObjectURL(a.href);
}

async function generateFromTemplate(){
    if(!templateBuffer){showStatus('템플릿을 먼저 선택하세요','error');return}
    const year=parseInt(document.getElementById('yearSelect').value);
    const months=getSelectedMonths();
    if(months.length===0){showStatus('월을 선택하세요','error');return}
    try{
        for(let i=0;i<months.length;i++){
            showStatus('엑셀 생성 중... ('+months[i]+'월, '+(i+1)+'/'+months.length+')','loading');
            showProgress(Math.round((i/months.length)*100));
            await generateFromBuffer(templateBuffer, year, months[i]);
            if(months.length>1) await new Promise(r=>setTimeout(r,500));
        }
        showProgress(100);
        showStatus(months.length>1?months.map(m=>m+'월').join(', ')+' 총 '+months.length+'개 파일 생성 완료!':months[0]+'월 생성 완료!','success');
        setTimeout(()=>showProgress(-1),2000);
    }catch(e){console.error(e);showStatus('오류: '+e.message,'error');showProgress(-1)}
}

// ============================================================
//  Generate: Built-in template mode
// ============================================================
async function generateFromBuiltin(){
    if(typeof EMBEDDED_TEMPLATE_B64==='undefined'){showStatus('내장 템플릿 데이터를 로드할 수 없습니다','error');return}
    const year=parseInt(document.getElementById('yearSelect').value);
    const months=getSelectedMonths();
    if(months.length===0){showStatus('월을 선택하세요','error');return}
    try{
        // Decode base64 once
        const bin=atob(EMBEDDED_TEMPLATE_B64);
        const arr=new Uint8Array(bin.length);
        for(let i=0;i<bin.length;i++)arr[i]=bin.charCodeAt(i);
        const baseBuf=arr.buffer;
        for(let i=0;i<months.length;i++){
            showStatus('엑셀 생성 중... ('+months[i]+'월, '+(i+1)+'/'+months.length+')','loading');
            showProgress(Math.round((i/months.length)*100));
            await generateFromBuffer(baseBuf, year, months[i]);
            if(months.length>1) await new Promise(r=>setTimeout(r,500));
        }
        showProgress(100);
        showStatus(months.length>1?months.map(m=>m+'월').join(', ')+' 총 '+months.length+'개 파일 생성 완료!':months[0]+'월 생성 완료!','success');
        setTimeout(()=>showProgress(-1),2000);
    }catch(e){console.error(e);showStatus('오류: '+e.message,'error');showProgress(-1)}
}

// ============================================================
//  UI
// ============================================================
function switchTab(m){document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',(m==='builtin'&&i===0)||(m==='template'&&i===1)));document.getElementById('panel-template').classList.toggle('active',m==='template');document.getElementById('panel-builtin').classList.toggle('active',m==='builtin')}
function showStatus(msg,type){const el=document.getElementById('status');el.textContent=msg;el.className='status show '+type}
function showProgress(pct){const pb=document.getElementById('progressBar'),pf=document.getElementById('progressFill');if(pct<0){pb.classList.remove('show')}else{pb.classList.add('show');pf.style.width=pct+'%'}}
function getSelectedMonths(){const cbs=document.querySelectorAll('#monthGrid input[type=checkbox]:checked');return Array.from(cbs).map(cb=>parseInt(cb.value)).sort((a,b)=>a-b)}
function selectMonths(mode){
    const cm=new Date().getMonth()+1;
    const cbs=document.querySelectorAll('#monthGrid input[type=checkbox]');
    if(mode==='all'){cbs.forEach(cb=>{cb.checked=true;cb.parentElement.classList.add('checked')})}
    else if(mode==='clear'){cbs.forEach(cb=>{cb.checked=false;cb.parentElement.classList.remove('checked')})}
    else if(mode==='quarter'){
        const q=Math.ceil(cm/3),qs=(q-1)*3+1;
        cbs.forEach(cb=>{const m=parseInt(cb.value);const on=m>=qs&&m<=qs+2;cb.checked=on;cb.parentElement.classList.toggle('checked',on)});
    }
    updateHP();
}
function updateHP(){
    const y=parseInt(document.getElementById('yearSelect').value);
    const months=getSelectedMonths();
    if(months.length===0){document.getElementById('holidaysList').innerHTML='<div class="holiday-item" style="color:#999">월을 선택하세요</div>';return}
    let html='';
    for(const m of months){
        const hs=[];for(let d=1;d<=getDIM(y,m);d++){const h=isHol(y,m,d);if(h)hs.push({d,n:h})}
        if(hs.length>0){html+='<div style="font-weight:600;color:#667eea;margin-top:'+(html?'6px':'0')+';font-size:12px">'+m+'월</div>';html+=hs.map(h=>'<div class="holiday-item"><span>'+h.d+'일</span><strong>'+h.n+'</strong></div>').join('')}
    }
    document.getElementById('holidaysList').innerHTML=html||'<div class="holiday-item" style="color:#999">선택한 월에 공휴일이 없습니다</div>';
}
document.addEventListener('DOMContentLoaded',()=>{
    const now=new Date(),cy=now.getFullYear(),cm=now.getMonth()+1;
    const ny=cm===12?cy+1:cy,nm=cm===12?1:cm+1;
    const ys=document.getElementById('yearSelect');
    for(let y=2025;y<=2027;y++){const o=document.createElement('option');o.value=y;o.textContent=y+'년';ys.appendChild(o)}
    ys.value=ny;
    // Month checkbox grid
    const mg=document.getElementById('monthGrid');
    for(let m=1;m<=12;m++){
        const lbl=document.createElement('label');
        const cb=document.createElement('input');cb.type='checkbox';cb.value=m;
        if(m===nm)cb.checked=true;
        cb.addEventListener('change',()=>{lbl.classList.toggle('checked',cb.checked);updateHP()});
        lbl.appendChild(cb);lbl.appendChild(document.createTextNode(m+'월'));
        if(m===nm)lbl.classList.add('checked');
        mg.appendChild(lbl);
    }
    ys.addEventListener('change',updateHP);
    updateHP();tryAutoLoad();
    // Drag-and-drop for template area
    const ta=document.getElementById('templateArea');
    ta.addEventListener('dragover',e=>{e.preventDefault();e.stopPropagation();ta.classList.add('dragover')});
    ta.addEventListener('dragleave',e=>{e.preventDefault();e.stopPropagation();ta.classList.remove('dragover')});
    ta.addEventListener('drop',e=>{
        e.preventDefault();e.stopPropagation();ta.classList.remove('dragover');
        const f=e.dataTransfer.files[0];
        if(!f)return;
        if(!f.name.endsWith('.xlsx')){showStatus('xlsx 파일만 사용할 수 있습니다','error');return}
        const r=new FileReader();r.onload=ev=>{templateBuffer=ev.target.result;markLoaded(f.name)};r.readAsArrayBuffer(f);
    });
});
</script>
